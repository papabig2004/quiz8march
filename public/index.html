<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .role-select {
            text-align: center;
            padding: 50px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            margin-top: 100px;
        }

        .role-select h1 {
            font-size: 3em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .role-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .role-btn {
            padding: 20px 40px;
            font-size: 1.5em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: bold;
        }

        .role-btn.player {
            background: #4CAF50;
            color: white;
        }

        .role-btn.admin {
            background: #f44336;
            color: white;
        }

        .role-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .hidden {
            display: none !important;
        }

        #playerView, #adminView {
            min-height: 100vh;
        }

        .player-list {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            max-width: 250px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 1000;
        }

        .player-list h3 {
            margin-bottom: 15px;
            color: #ffd700;
        }

        .player-item {
            padding: 8px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }

        .player-score {
            color: #ffd700;
            font-weight: bold;
        }

        .question-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .timer {
            font-size: 5em;
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .question-progress {
            text-align: center;
            font-size: 1.2em;
            margin: 10px 0;
            color: #ddd;
        }

        .question-text {
            font-size: 2em;
            text-align: center;
            margin: 30px 0;
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .option-btn {
            padding: 30px 20px;
            font-size: 1.3em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-weight: bold;
            text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .option-btn.selected {
            background: #4CAF50;
            color: white;
        }

        .option-btn.correct-answer {
            background: #4CAF50;
            color: white;
            border: 3px solid #ffd700;
        }

        .option-btn.wrong-answer {
            background: #f44336;
            color: white;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-stats {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background: rgba(0, 0, 0, 0.3);
            transition: width 0.3s;
        }

        .stats-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: normal;
        }

        .waiting-screen {
            text-align: center;
            padding: 100px 20px;
        }

        .waiting-screen h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .admin-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-header h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .admin-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .admin-btn {
            padding: 15px 30px;
            font-size: 1.2em;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .admin-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .admin-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .admin-btn.next {
            background: #ff9800;
        }

        .admin-question {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .admin-question h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        .stats-container {
            margin-top: 20px;
        }

        .stat-item {
            margin: 15px 0;
            position: relative;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 1.1em;
        }

        .stat-bar {
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            color: white;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            transition: width 0.3s;
        }

        .stat-correct-mark {
            position: absolute;
            top: -25px;
            right: 0;
            color: #ffd700;
            font-weight: bold;
        }

        .pause-screen {
            text-align: center;
            padding: 50px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            margin-top: 30px;
        }

        .pause-screen h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .correct-answer-display {
            font-size: 3em;
            margin: 20px 0;
            padding: 20px;
            background: rgba(76, 175, 80, 0.3);
            border-radius: 20px;
            border: 2px solid #4CAF50;
        }

        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .question-text {
                font-size: 1.5em;
            }
            
            .timer {
                font-size: 3em;
            }
            
            .player-list {
                position: static;
                max-width: 100%;
                margin-bottom: 20px;
            }

            .admin-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Выбор роли -->
        <div id="roleSelect" class="role-select">
            <h1>🎮 ВИКТОРИНА 🎮</h1>
            <div class="role-buttons">
                <button onclick="selectRole('player')" class="role-btn player">👤 Я игрок</button>
                <button onclick="selectRole('admin')" class="role-btn admin">👑 Я админ</button>
            </div>
        </div>

        <!-- Вид для игрока -->
        <div id="playerView" class="hidden">
            <div class="player-list">
                <h3>📊 Игроки</h3>
                <div id="playersList"></div>
            </div>

            <div id="questionView" class="hidden">
                <div class="question-container">
                    <div class="timer" id="timer">60</div>
                    <div class="question-progress" id="progress"></div>
                    <div class="question-text" id="questionText"></div>
                    <div class="options-grid" id="options"></div>
                </div>
            </div>

            <div id="pauseView" class="hidden">
                <div class="pause-screen">
                    <h2>⏸ Время вышло!</h2>
                    <div id="correctAnswer" class="correct-answer-display"></div>
                    <div class="stats-container" id="pauseStats"></div>
                    <p>Ожидание следующего вопроса...</p>
                    <div class="spinner"></div>
                </div>
            </div>

            <div id="waitingView" class="waiting-screen">
                <h2>⏳ Ожидание начала игры...</h2>
                <p>Подключаются другие игроки</p>
                <div class="spinner"></div>
            </div>

            <div id="gameEndView" class="waiting-screen hidden">
                <h2>🏆 Игра окончена! 🏆</h2>
                <div id="winners"></div>
            </div>
        </div>

        <!-- Вид для админа -->
        <div id="adminView" class="hidden">
            <div class="admin-header">
                <h1>👑 Панель администратора</h1>
                <div class="admin-buttons">
                    <button onclick="startGame()" class="admin-btn" id="startBtn">Начать игру</button>
                    <button onclick="nextQuestion()" class="admin-btn next" id="nextBtn" disabled>Следующий вопрос ➡</button>
                </div>
            </div>

            <div id="adminStats" class="hidden">
                <div class="admin-question" id="adminQuestion"></div>
                <div class="stats-container" id="adminStatBars"></div>
                <div id="adminPauseInfo" class="hidden">
                    <h3>⏸ Вопрос завершен</h3>
                    <p>Нажмите "Следующий вопрос" для продолжения</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let role = null;
        let currentQuestion = null;
        let hasAnswered = false;
        let timerInterval = null;
        let questionEnded = false;

        window.selectRole = function(r) {
            console.log('Выбрана роль:', r);
            role = r;
            let name = '';
            
            if (r === 'player') {
                name = prompt('Введите ваше имя:', 'Игрок') || 'Аноним';
            }
            
            document.getElementById('roleSelect').classList.add('hidden');
            
            if (r === 'player') {
                document.getElementById('playerView').classList.remove('hidden');
                document.getElementById('waitingView').classList.remove('hidden');
            } else {
                document.getElementById('adminView').classList.remove('hidden');
            }
            
            socket.emit('join', r, name);
        };

        window.startGame = function() {
            console.log('Запуск игры');
            socket.emit('start-game');
            document.getElementById('startBtn').disabled = true;
        };

        window.nextQuestion = function() {
            console.log('Следующий вопрос');
            socket.emit('next-question');
            document.getElementById('nextBtn').disabled = true;
        };

        window.answer = function(letter) {
            console.log('Ответ:', letter);
            if (currentQuestion && !hasAnswered && !questionEnded) {
                hasAnswered = true;
                socket.emit('answer', { answer: letter });
                
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.disabled = true;
                    if (btn.id === `opt-${letter}`) {
                        btn.classList.add('selected');
                    }
                });
            }
        };

        function updateOptionStats(stats) {
            document.querySelectorAll('.option-btn').forEach(btn => {
                const letter = btn.id.replace('opt-', '');
                const count = stats.counts[letter] || 0;
                const percentage = stats.percentages[letter] || 0;
                
                // Удаляем старые бейджи и полоски
                const oldBadge = btn.querySelector('.stats-badge');
                const oldStats = btn.querySelector('.option-stats');
                if (oldBadge) oldBadge.remove();
                if (oldStats) oldStats.remove();
                
                // Добавляем новый бейдж
                const badge = document.createElement('span');
                badge.className = 'stats-badge';
                badge.textContent = `${count} (${percentage}%)`;
                btn.appendChild(badge);
                
                // Добавляем полоску статистики
                const statsBar = document.createElement('div');
                statsBar.className = 'option-stats';
                statsBar.style.width = `${percentage}%`;
                btn.appendChild(statsBar);
            });
        }

        socket.on('connect', () => {
            console.log('Подключено к серверу');
        });

        socket.on('init', (data) => {
            console.log('Init:', data);
            if (data.gameState && role === 'player') {
                document.getElementById('waitingView').classList.add('hidden');
                document.getElementById('questionView').classList.remove('hidden');
            }
        });

        socket.on('players-update', (players) => {
            if (role === 'player') {
                const playersList = document.getElementById('playersList');
                playersList.innerHTML = players
                    .sort((a, b) => b.score - a.score)
                    .map(p => `
                        <div class="player-item">
                            <span>${p.name}</span>
                            <span class="player-score">${p.score}</span>
                        </div>
                    `).join('');
            }
        });

        socket.on('new-question', (q) => {
            console.log('Новый вопрос:', q);
            hasAnswered = false;
            questionEnded = false;
            currentQuestion = q;
            
            if (role === 'player') {
                document.getElementById('waitingView').classList.add('hidden');
                document.getElementById('pauseView').classList.add('hidden');
                document.getElementById('questionView').classList.remove('hidden');
                document.getElementById('gameEndView')?.classList.add('hidden');
                
                document.getElementById('questionText').textContent = q.question;
                document.getElementById('progress').textContent = 
                    `Вопрос ${q.questionNumber} из ${q.totalQuestions}`;
                
                const optionsDiv = document.getElementById('options');
                optionsDiv.innerHTML = q.options.map(opt => {
                    const letter = opt.charAt(0);
                    return `<button class="option-btn" onclick="answer('${letter}')" id="opt-${letter}">${opt}</button>`;
                }).join('');
                
                let timeLeft = q.timer;
                const timerSpan = document.getElementById('timer');
                timerSpan.textContent = timeLeft;
                
                if (timerInterval) clearInterval(timerInterval);
                
                timerInterval = setInterval(() => {
                    timeLeft--;
                    timerSpan.textContent = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                    }
                }, 1000);
                
            } else if (role === 'admin') {
                document.getElementById('adminStats').classList.remove('hidden');
                document.getElementById('startBtn').disabled = true;
                document.getElementById('nextBtn').disabled = true;
                document.getElementById('adminPauseInfo').classList.add('hidden');
                
                document.getElementById('adminQuestion').innerHTML = `
                    <h3>${q.questionNumber}. ${q.question}</h3>
                    <p>⏱️ Время: ${q.timer} сек</p>
                `;
            }
        });

        socket.on('stats-update', (stats) => {
            console.log('Статистика:', stats);
            
            if (role === 'player') {
                updateOptionStats(stats);
            } else if (role === 'admin') {
                const barsDiv = document.getElementById('adminStatBars');
                barsDiv.innerHTML = '<h3>📊 Статистика ответов</h3>';
                
                const letters = ['A', 'B', 'C', 'D'];
                letters.forEach(letter => {
                    const count = stats.counts[letter] || 0;
                    const percentage = stats.percentages[letter] || 0;
                    
                    let markHtml = '';
                    if (stats.correct === letter) {
                        markHtml = '<div class="stat-correct-mark">✓ Правильный ответ</div>';
                    }
                    
                    barsDiv.innerHTML += `
                        <div class="stat-item">
                            <div class="stat-label">
                                <span>Вариант ${letter}</span>
                                <span>${count} ответов (${percentage}%)</span>
                            </div>
                            <div class="stat-bar">
                                <div class="stat-fill" style="width: ${percentage}%">${percentage}%</div>
                            </div>
                            ${markHtml}
                        </div>
                    `;
                });
                
                barsDiv.innerHTML += `<p>Всего ответов: ${stats.total} из ${stats.totalPlayers} игроков</p>`;
            }
        });

        socket.on('question-end', (data) => {
            console.log('Вопрос завершен:', data);
            questionEnded = true;
            
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            if (role === 'player') {
                document.getElementById('questionView').classList.add('hidden');
                document.getElementById('pauseView').classList.remove('hidden');
                
                // Показываем правильный ответ
                const correctLetter = data.correct;
                let correctText = '';
                if (currentQuestion) {
                    const correctOption = currentQuestion.options.find(opt => opt.charAt(0) === correctLetter);
                    correctText = correctOption || `Вариант ${correctLetter}`;
                }
                document.getElementById('correctAnswer').innerHTML = `
                    Правильный ответ: ${correctText}
                `;
                
                // Показываем финальную статистику
                const statsDiv = document.getElementById('pauseStats');
                statsDiv.innerHTML = '<h3>📊 Итоговая статистика</h3>';
                
                const letters = ['A', 'B', 'C', 'D'];
                letters.forEach(letter => {
                    const count = data.stats.counts[letter] || 0;
                    const percentage = data.stats.percentages[letter] || 0;
                    
                    statsDiv.innerHTML += `
                        <div class="stat-item">
                            <div class="stat-label">
                                <span>Вариант ${letter}</span>
                                <span>${count} ответов (${percentage}%)</span>
                            </div>
                            <div class="stat-bar">
                                <div class="stat-fill" style="width: ${percentage}%">${percentage}%</div>
                            </div>
                        </div>
                    `;
                });
                
                // Подсвечиваем правильный ответ на кнопках
                document.querySelectorAll('.option-btn').forEach(btn => {
                    const letter = btn.id.replace('opt-', '');
                    if (letter === data.correct) {
                        btn.classList.add('correct-answer');
                    } else if (btn.classList.contains('selected')) {
                        btn.classList.add('wrong-answer');
                    }
                });
                
            } else if (role === 'admin') {
                document.getElementById('nextBtn').disabled = false;
                document.getElementById('adminPauseInfo').classList.remove('hidden');
            }
        });

        socket.on('game-end', (winners) => {
            console.log('Игра окончена:', winners);
            
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            if (role === 'player') {
                document.getElementById('questionView').classList.add('hidden');
                document.getElementById('pauseView').classList.add('hidden');
                document.getElementById('waitingView').classList.add('hidden');
                document.getElementById('gameEndView').classList.remove('hidden');
                
                const winnersDiv = document.getElementById('winners');
                winnersDiv.innerHTML = `
                    <h3>🥇 Победитель: ${winners[0]?.name} (${winners[0]?.score} очков)</h3>
                    <br>
                    <h4>Итоговая таблица:</h4>
                    ${winners.map((w, i) => `
                        <div class="player-item">
                            <span>${i+1}. ${w.name}</span>
                            <span class="player-score">${w.score}</span>
                        </div>
                    `).join('')}
                `;
            } else if (role === 'admin') {
                alert('Игра окончена! Победитель: ' + winners[0]?.name);
                document.getElementById('startBtn').disabled = false;
                document.getElementById('nextBtn').disabled = true;
            }
        });
    </script>
</body>
</html>
