<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Роли */
        .role-select {
            text-align: center;
            padding: 50px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            margin-top: 100px;
        }

        .role-select h1 {
            font-size: 3em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .role-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .role-btn {
            padding: 20px 40px;
            font-size: 1.5em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: bold;
        }

        .role-btn.player {
            background: #4CAF50;
            color: white;
        }

        .role-btn.admin {
            background: #f44336;
            color: white;
        }

        .role-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Игрок */
        #playerView {
            position: relative;
        }

        .player-list {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            max-width: 250px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 1000;
        }

        .player-list h3 {
            margin-bottom: 15px;
            color: #ffd700;
        }

        .player-item {
            padding: 8px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }

        .player-score {
            color: #ffd700;
            font-weight: bold;
        }

        .question-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .timer {
            font-size: 5em;
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .question-progress {
            text-align: center;
            font-size: 1.2em;
            margin: 10px 0;
            color: #ddd;
        }

        .question-text {
            font-size: 2em;
            text-align: center;
            margin: 30px 0;
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .option-btn {
            padding: 30px 20px;
            font-size: 1.3em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-weight: bold;
            text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .option-btn.selected {
            background: #4CAF50;
            color: white;
        }

        .option-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .waiting-screen {
            text-align: center;
            padding: 100px 20px;
        }

        .waiting-screen h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .waiting-screen p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* Админ */
        #adminView {
            max-width: 800px;
            margin: 0 auto;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-header h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .start-btn {
            padding: 20px 50px;
            font-size: 1.5em;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .start-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .admin-question {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .admin-question h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        .stats-container {
            margin-top: 20px;
        }

        .stat-item {
            margin: 15px 0;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 1.1em;
        }

        .stat-bar {
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            color: white;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            transition: width 0.3s;
        }

        .hidden {
            display: none !important;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .question-text {
                font-size: 1.5em;
            }
            
            .timer {
                font-size: 3em;
            }
            
            .player-list {
                position: static;
                max-width: 100%;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Выбор роли -->
        <div id="roleSelect" class="role-select">
            <h1>🎮 ВИКТОРИНА 🎮</h1>
            <div class="role-buttons">
                <button onclick="selectRole('player')" class="role-btn player">👤 Я игрок</button>
                <button onclick="selectRole('admin')" class="role-btn admin">👑 Я админ</button>
            </div>
        </div>

        <!-- Вид для игрока -->
        <div id="playerView" class="hidden">
            <div class="player-list" id="playerList">
                <h3>📊 Игроки</h3>
                <div id="playersList"></div>
            </div>

            <div id="questionView" class="hidden">
                <div class="question-container">
                    <div class="timer" id="timer">20</div>
                    <div class="question-progress" id="progress"></div>
                    <div class="question-text" id="questionText"></div>
                    <div class="options-grid" id="options"></div>
                </div>
            </div>

            <div id="waitingView" class="waiting-screen">
                <h2>⏳ Ожидание начала игры...</h2>
                <p>Подключаются другие игроки</p>
                <div class="spinner"></div>
            </div>

            <div id="gameEndView" class="waiting-screen hidden">
                <h2>🏆 Игра окончена! 🏆</h2>
                <div id="winners"></div>
            </div>
        </div>

        <!-- Вид для админа -->
        <div id="adminView" class="hidden">
            <div class="admin-header">
                <h1>👑 Панель администратора</h1>
                <button onclick="startGame()" class="start-btn" id="startBtn">Начать игру</button>
            </div>

            <div id="adminStats" class="hidden">
                <div class="admin-question" id="adminQuestion"></div>
                <div class="stats-container" id="statBars"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let role = null;
        let currentQuestion = null;
        let hasAnswered = false;

        function selectRole(r) {
            role = r;
            let name = '';
            
            if (r === 'player') {
                name = prompt('Введите ваше имя:', 'Игрок') || 'Аноним';
            }
            
            document.getElementById('roleSelect').classList.add('hidden');
            
            if (r === 'player') {
                document.getElementById('playerView').classList.remove('hidden');
                document.getElementById('waitingView').classList.remove('hidden');
            } else {
                document.getElementById('adminView').classList.remove('hidden');
            }
            
            socket.emit('join', r, name);
        }

        socket.on('init', (data) => {
            console.log('Init:', data);
            if (data.gameState && role === 'player') {
                document.getElementById('waitingView').classList.add('hidden');
                document.getElementById('questionView').classList.remove('hidden');
            }
        });

        socket.on('players-update', (players) => {
            if (role === 'player') {
                const playersList = document.getElementById('playersList');
                playersList.innerHTML = players
                    .sort((a, b) => b.score - a.score)
                    .map(p => `
                        <div class="player-item">
                            <span>${p.name}</span>
                            <span class="player-score">${p.score}</span>
                        </div>
                    `).join('');
            }
        });

        socket.on('new-question', (q) => {
            hasAnswered = false;
            currentQuestion = q;
            
            if (role === 'player') {
                document.getElementById('waitingView').classList.add('hidden');
                document.getElementById('questionView').classList.remove('hidden');
                document.getElementById('gameEndView')?.classList.add('hidden');
                
                document.getElementById('questionText').textContent = q.question;
                document.getElementById('progress').textContent = 
                    `Вопрос ${q.questionNumber} из ${q.totalQuestions}`;
                
                const optionsDiv = document.getElementById('options');
                optionsDiv.innerHTML = q.options.map(opt => {
                    const letter = opt.charAt(0);
                    return `<button class="option-btn" onclick="answer('${letter}')" id="opt-${letter}">${opt}</button>`;
                }).join('');
                
                let timeLeft = q.timer;
                const timerSpan = document.getElementById('timer');
                timerSpan.textContent = timeLeft;
                
                if (window.timerInterval) clearInterval(window.timerInterval);
                
                window.timerInterval = setInterval(() => {
                    timeLeft--;
                    timerSpan.textContent = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(window.timerInterval);
                        document.querySelectorAll('.option-btn').forEach(btn => {
                            btn.disabled = true;
                        });
                    }
                }, 1000);
                
                // Автоматически блокируем кнопки через время
                setTimeout(() => {
                    document.querySelectorAll('.option-btn').forEach(btn => {
                        btn.disabled = true;
                    });
                }, q.timer * 1000);
                
            } else if (role === 'admin') {
                document.getElementById('adminStats').classList.remove('hidden');
                document.getElementById('startBtn').disabled = true;
                document.getElementById('adminQuestion').innerHTML = `
                    <h3>${q.questionNumber}. ${q.question}</h3>
                    <p>⏱️ Время: ${q.timer} сек</p>
                `;
            }
        });

        socket.on('stats-update', (stats) => {
            if (role === 'admin') {
                const barsDiv = document.getElementById('statBars');
                barsDiv.innerHTML = '<h3>📊 Статистика ответов</h3>';
                
                const letters = ['A', 'B', 'C', 'D'];
                letters.forEach(letter => {
                    const count = stats.counts[letter] || 0;
                    const percentage = stats.percentages[letter] || 0;
                    
                    barsDiv.innerHTML += `
                        <div class="stat-item">
                            <div class="stat-label">
                                <span>Вариант ${letter}</span>
                                <span>${count} ответов (${percentage}%)</span>
                            </div>
                            <div class="stat-bar">
                                <div class="stat-fill" style="width: ${percentage}%">${percentage}%</div>
                            </div>
                        </div>
                    `;
                });
                
                barsDiv.innerHTML += `<p>Всего ответов: ${stats.total}</p>`;
            }
        });

        socket.on('game-end', (winners) => {
            if (role === 'player') {
                document.getElementById('questionView').classList.add('hidden');
                document.getElementById('waitingView').classList.add('hidden');
                document.getElementById('gameEndView').classList.remove('hidden');
                
                const winnersDiv = document.getElementById('winners');
                winnersDiv.innerHTML = `
                    <h3>🥇 Победитель: ${winners[0]?.name} (${winners[0]?.score} очков)</h3>
                    <br>
                    <h4>Итоговая таблица:</h4>
                    ${winners.map((w, i) => `
                        <div class="player-item">
                            <span>${i+1}. ${w.name}</span>
                            <span class="player-score">${w.score}</span>
                        </div>
                    `).join('')}
                `;
            } else if (role === 'admin') {
                alert('Игра окончена! Победитель: ' + winners[0]?.name);
                document.getElementById('startBtn').disabled = false;
            }
